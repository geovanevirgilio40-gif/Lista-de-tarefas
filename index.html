<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>Lista de Tarefas</title>
   <style>
  * {
  box-sizing: border-box;
  font-family: Arial, Helvetica, sans-serif;
}

body {
  background:black;
  color: #fff;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.container {
  background: #1e293b;
  padding: 20px;
  border-radius: 10px;
  width: 350px;
}

h1 {
  text-align: center;  
  color: #38bdf8;
}
h3 {
  text-align: center;
  margin-bottom: 25px;
  color: #38bdf8;
}

.input-area {
  display: flex;
  gap: 10px;
}

input {
  flex: 1;
  border-radius: 5px;
  border: none;
  outline: none;
}

button {
  padding: 10px;
  border: none;
  border-radius: 5px;
  background: #38bdf8;
  cursor: pointer;
  font-weight: bold;
}

button:hover {
  background: #0ea5e9;
}

ul {
  list-style: none;
  padding: 0;
  margin-top: 20px;
}

li {
  background: #334155;
  padding: 10px;
  border-radius: 5px;
  margin-bottom: 10px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

li.completed {
  text-decoration: line-through;
  opacity: 0.6;
}

.delete {
  background: #ef4444;
  border: none;
  padding: 5px 8px;
  border-radius: 5px;
  cursor: pointer;
  color: white;
}
  
  .nome{
  position: fixed;
  bottom: 10px;
  left: 10px;  
  font-weight: bold;
  font-size: 16px;
  color: #ff1493;
  text-shadow: 0 0 10px #ff00ff;
  }
  </style>
</head>
<body>
     
  <div class="container">
   
  <h3>Adicionar Tarefas</h3> 
     <div class="input-area">
         <input type="text" id="taskInput" placeholder="Digite uma tarefa">
         <button onclick="addTask()">Adicionar</button>
     </div>
    <hr>
  <ul id="taskList"></ul>
    
  </div>
  
  <p class="nome">Cailane Agustinho</p>
  
  <script>
  function addTask() {
  const input = document.getElementById("taskInput");
  const taskText = input.value.trim();

  if (taskText === "") {
    alert("Digite uma tarefa!");
    return;
  }

  const li = document.createElement("li");
  li.textContent = taskText;

  li.onclick = function () {
    li.classList.toggle("completed");
  };

  const deleteBtn = document.createElement("button");
  deleteBtn.textContent = "X";
  deleteBtn.className = "delete";
  deleteBtn.onclick = function (e) {
    e.stopPropagation();
    li.remove();
  };

  li.appendChild(deleteBtn);
  document.getElementById("taskList").appendChild(li);

  input.value = "";
}


  </script>
</body>
</html>
