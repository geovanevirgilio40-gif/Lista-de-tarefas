<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Lista de Tarefas</title>
  <style>
  * {
    box-sizing: border-box;
    font-family: Arial, Helvetica, sans-serif;
    margin: 0;
    padding: 0;
  }

  body {
    background: black;
    color: #fff;
    margin: 0;
    padding: clamp(10px, 5vw, 20px);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
  }

  /* Container responsivo */
  .container {
    background: #1e293b;
    padding: clamp(15px, 5vw, 25px);
    border-radius: clamp(10px, 3vw, 15px);
    width: 100%;
    max-width: 500px;
    margin: 0 auto;
    box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
  }

  /* Títulos */
  h3 {
    text-align: center;
    margin-bottom: 20px;
    color: #38bdf8;
    font-size: clamp(18px, 5vw, 24px);
  }

  /* Input area */
  .input-area {
    display: flex;
    gap: clamp(8px, 2vw, 12px);
    flex-wrap: wrap;
  }

  /* Input */
  input {
    flex: 1;
    min-width: 150px;
    padding: clamp(10px, 3vw, 12px);
    border-radius: 5px;
    border: none;
    outline: none;
    font-size: clamp(14px, 3.5vw, 16px);
  }

  input:focus {
    box-shadow: 0 0 0 2px #38bdf8;
  }

  /* Botão */
  button {
    padding: clamp(10px, 3vw, 12px) clamp(15px, 4vw, 20px);
    border: none;
    border-radius: 5px;
    background: #38bdf8;
    cursor: pointer;
    font-weight: bold;
    font-size: clamp(14px, 3.5vw, 16px);
    transition: all 0.2s ease;
    white-space: nowrap;
  }

  button:hover {
    background: #0ea5e9;
    transform: scale(1.02);
  }

  button:active {
    transform: scale(0.98);
  }

  /* Lista */
  ul {
    list-style: none;
    padding: 0;
    margin-top: 20px;
  }

  /* Item */
  li {
    background: #334155;
    padding: clamp(10px, 3vw, 12px);
    border-radius: 5px;
    margin-bottom: 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
    font-size: clamp(14px, 3.5vw, 16px);
    word-break: break-word;
    transition: all 0.2s ease;
    cursor: pointer;
  }

  li:hover {
    background: #3b4a66;
    transform: translateX(3px);
  }

  /* Tarefa concluída */
  li.completed {
    text-decoration: line-through;
    opacity: 0.6;
  }

  /* Botão delete */
  .delete {
    background: #ef4444;
    border: none;
    padding: clamp(5px, 2vw, 8px) clamp(8px, 3vw, 12px);
    border-radius: 5px;
    cursor: pointer;
    color: white;
    font-weight: bold;
    font-size: clamp(12px, 3vw, 14px);
    transition: all 0.2s ease;
    flex-shrink: 0;
    white-space: nowrap;
  }

  .delete:hover {
    background: #dc2626;
    transform: scale(1.05);
  }

  .delete:active {
    transform: scale(0.95);
  }

  /* Nome */
  .nome {
    position: fixed;
    bottom: clamp(10px, 3vw, 15px);
    left: clamp(10px, 3vw, 15px);
    font-weight: bold;
    font-size: clamp(12px, 3.5vw, 14px);
    color: #ff1493;
    text-shadow: 0 0 10px #ff00ff;
    background: rgba(0, 0, 0, 0.5);
    padding: 5px 10px;
    border-radius: 20px;
    backdrop-filter: blur(5px);
    z-index: 100;
  }

  /* 📱 Responsividade avançada */

  /* Tablets */
  @media (max-width: 768px) {
    .container {
      max-width: 90%;
    }
  }

  /* Telemóveis */
  @media (max-width: 480px) {
    .input-area {
      flex-direction: column;
    }
    
    input {
      min-width: auto;
      width: 100%;
    }
    
    button {
      width: 100%;
      white-space: normal;
    }
    
    .container {
      max-width: 95%;
    }
    
    li {
      flex-wrap: wrap;
    }
    
    .delete {
      width: auto;
      min-width: 40px;
    }
  }

  /* Telas muito pequenas */
  @media (max-width: 320px) {
    body {
      padding: 8px;
    }
    
    .container {
      padding: 12px;
    }
    
    li {
      flex-direction: column;
      text-align: center;
    }
    
    .delete {
      width: 100%;
      margin-top: 8px;
    }
  }

  /* Landscape mode */
  @media (max-height: 500px) and (orientation: landscape) {
    body {
      padding: 5px;
    }
    
    .container {
      max-width: 80%;
    }
    
    .nome {
      position: static;
      text-align: center;
      margin-top: 10px;
      display: inline-block;
      width: fit-content;
      margin-left: auto;
      margin-right: auto;
    }
  }

  /* Prefers reduced motion */
  @media (prefers-reduced-motion: reduce) {
    * {
      animation-duration: 0.01ms !important;
      transition-duration: 0.01ms !important;
    }
  }
  </style>
</head>
<body>
     
  <div class="container">
    <h3>📝 Adicionar Tarefas</h3> 
    <div class="input-area">
      <input type="text" id="taskInput" placeholder="Digite uma tarefa..." autocomplete="off">
      <button onclick="addTask()">➕ Adicionar</button>
    </div>
    <br>
    <hr>
    <ul id="taskList"></ul>
  </div>
  
  <p class="nome">✨ Cailane Agustinho ✨</p>
  
  <script>
    // Permite adicionar tarefa pressionando Enter
    document.getElementById("taskInput").addEventListener("keypress", function(event) {
      if (event.key === "Enter") {
        addTask();
      }
    });

    function addTask() {
      const input = document.getElementById("taskInput");
      const taskText = input.value.trim();

      if (taskText === "") {
        alert("⚠️ Digite uma tarefa!");
        return;
      }

      const li = document.createElement("li");
      
      // Criar span para o texto da tarefa
      const taskSpan = document.createElement("span");
      taskSpan.textContent = taskText;
      taskSpan.style.flex = "1";
      
      li.appendChild(taskSpan);

      // Marcar como concluída ao clicar no item
      li.onclick = function (e) {
        if (e.target !== deleteBtn) {
          li.classList.toggle("completed");
        }
      };

      const deleteBtn = document.createElement("button");
      deleteBtn.textContent = "🗑️ X";
      deleteBtn.className = "delete";
      deleteBtn.onclick = function (e) {
        e.stopPropagation();
        li.remove();
      };

      li.appendChild(deleteBtn);
      document.getElementById("taskList").appendChild(li);

      input.value = "";
      input.focus();
    }
  </script>
</body>
</html>
